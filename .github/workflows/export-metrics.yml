name: Export Snowflake Marketplace Metrics

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      listing_filter:
        description: 'Listing name filter (SQL LIKE pattern)'
        required: false
        default: '%FALKORDB%'

jobs:
  export-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: metrics/requirements.txt

      - name: Install dependencies
        run: pip install -r metrics/requirements.txt

      - name: Export Snowflake data for HubSpot subscriptions
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        run: |
          python metrics/export_metrics.py \
            --listing-filter "${{ inputs.listing_filter || '%FALKORDB%' }}" \
            --output metrics_report.json

      - name: Show summary
        run: |
          echo "### Snowflake → HubSpot Subscription Export" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          with open('metrics_report.json') as f:
              data = json.load(f)
          print(json.dumps({'subscription_count': data['subscription_count'], 'export_timestamp': data['export_timestamp']}, indent=2))
          " >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload metrics report
        uses: actions/upload-artifact@v4
        with:
          name: sf-metrics-${{ github.run_id }}
          path: metrics_report.json
          retention-days: 90
